# E8 — CLUTRR-style systematic generalization (lineal-kinship fragment).
# Train the composition table end-to-end on short chains, test on long ones
# under bounded vs convergent reasoning. Registered prediction: test accuracy
# cliffs at exactly the depth horizon k = n + 1 (chain length k needs k-1
# composition steps); the convergent reasoner generalizes from k <= 3 to
# k = 10 because the learned table approaches the true (deterministic)
# composition.
seeds: [0, 1, 2]
train_k: [2, 3]
test_k: [2, 3, 4, 5, 6, 7, 8, 9, 10]
budgets: [2, 4, 8, convergent]   # max composition steps at deployment
n_train: 2000
n_test_per_k: 500
steps: 3000
lr: 0.05
