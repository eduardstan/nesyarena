# E6 (fact-table setting) — population-loss limit of the learning experiment:
# a free fact table trained through each reasoner.
treatment:                  # G1 overlap, heterogeneous ground truth
  structure: { P: 4, L: 3, c: 2 }
  truth_seeds_base: 100     # rng(100+s) draws q_true
  train_queries: [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3],[0,1,2,3]]
  held_queries: [[0],[1],[2],[3],[0,1,2]]
control:                    # categorical sum (MNIST-sum_2 structure, |dom|=3)
  domain: 3
  truth_seeds_base: 200     # rng(200+s) draws dirichlet truths
seeds: 5
optimizer: { steps: 4000, lr: 0.05 }
# addmult_st added per finding F-3 (deployed straight-through clamp).
# REGISTERED (before run): P1 — on the overlap treatment, addmult_st's
# transfer differs from min-clamp addmult beyond seed noise (direction
# open: no blackout, but unclamped push with no value feedback);
# P2 — on the disjoint control (no saturation) addmult_st == addmult == exact.
suts: [exact, addmult, top1, top3, minmax, ltn_product, ltn_godel]
